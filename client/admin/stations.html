<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة المحطات - Super Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root { --primary:#1e40af; --primary-dark:#1e3a8a; --success:#059669; --danger:#dc2626; --warning:#d97706; --text-dark:#0f172a; --text-secondary:#475569; --border:#e8edf2; --bg:#f8fafc; --white:#ffffff; }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text-dark); min-height:100vh; }
    .navbar { background:var(--primary-dark); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:64px; }
    .navbar-brand { color:white; font-weight:900; font-size:1.2rem; text-decoration:none; display:flex; align-items:center; gap:0.7rem; }
    .nav-links { display:flex; gap:1.5rem; align-items:center; }
    .nav-link { color:rgba(255,255,255,0.7); text-decoration:none; font-weight:700; font-size:0.9rem; }
    .nav-link:hover, .nav-link.active { color:white; }
    .btn-logout { background:rgba(255,255,255,0.15); color:white; border:1px solid rgba(255,255,255,0.25); padding:0.5rem 1rem; border-radius:8px; font-family:'Cairo'; font-weight:700; cursor:pointer; font-size:0.85rem; }
    .container { max-width:1100px; margin:2rem auto; padding:0 1.5rem; }
    h1 { font-size:1.5rem; font-weight:900; margin-bottom:1.5rem; display:flex; align-items:center; gap:0.5rem; }
    .btn { padding:0.7rem 1.5rem; border:none; border-radius:10px; font-family:'Cairo'; font-weight:700; cursor:pointer; font-size:0.9rem; }
    .btn-primary { background:var(--primary); color:white; }
    .btn-success { background:var(--success); color:white; }
    .btn-danger { background:var(--danger); color:white; }
    .btn-sm { padding:0.4rem 1rem; font-size:0.8rem; border-radius:6px; }
    .table-wrap { background:var(--white); border-radius:14px; border:1px solid var(--border); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    th { padding:1rem 1.2rem; background:var(--bg); font-size:0.82rem; font-weight:800; color:var(--text-secondary); text-transform:uppercase; text-align:right; }
    td { padding:1rem 1.2rem; border-top:1px solid var(--border); font-size:0.92rem; }
    tr:hover { background:var(--bg-light); }
    .badge { display:inline-block; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.78rem; font-weight:700; }
    .badge-active { background:#dcfce7; color:#166534; }
    .badge-suspended { background:#fee2e2; color:#991b1b; }
    .badge-expired { background:#fef3c7; color:#92400e; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:1000; }
    .modal-overlay.open { display:flex; }
    .modal { background:white; border-radius:16px; padding:2rem; width:90%; max-width:440px; }
    .modal h2 { font-size:1.15rem; margin-bottom:1.2rem; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.3rem; }
    .form-group input, .form-group select { width:100%; padding:0.7rem 1rem; border:1.5px solid var(--border); border-radius:8px; font-family:'Cairo'; font-size:0.95rem; outline:none; }
    .form-group input:focus, .form-group select:focus { border-color:var(--primary); }
    .modal-actions { display:flex; gap:0.5rem; margin-top:1.5rem; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/admin/" class="navbar-brand"><i class="fas fa-shield-alt"></i> الإدارة العامة</a>
    <div class="nav-links">
      <a href="/admin/" class="nav-link"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</a>
      <a href="/admin/stations.html" class="nav-link active"><i class="fas fa-building"></i> المحطات</a>
      <a href="/admin/users.html" class="nav-link"><i class="fas fa-users"></i> المستخدمون</a>
      <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
  </nav>

  <div class="container" style="display:none;" id="content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <h1><i class="fas fa-building"></i> إدارة المحطات</h1>
      <button class="btn btn-primary" onclick="openModal('add')"><i class="fas fa-plus"></i> إضافة محطة</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>المحطة</th><th>الحالة</th><th>نهاية الاشتراك</th><th>المستخدمون</th><th>إجراءات</th></tr></thead>
        <tbody id="stations-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal" style="animation:fadeUp .25s ease">
      <h2 id="modal-title">إضافة محطة</h2>
      <input type="hidden" id="sid">
      <div class="form-group">
        <label>اسم المحطة</label>
        <input type="text" id="m-name">
      </div>
      <div class="form-group">
        <label>الحالة</label>
        <select id="m-status">
          <option value="active">نشطة</option>
          <option value="suspended">موقوفة</option>
          <option value="expired">منتهية</option>
        </select>
      </div>
      <div class="form-group">
        <label>نهاية الاشتراك</label>
        <input type="date" id="m-end">
      </div>
      <div class="modal-actions">
        <button class="btn btn-success" onclick="saveStation()">حفظ</button>
        <button class="btn btn-danger" onclick="closeModal()">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/superadmin';
    let stations = [];
    function getToken() { return localStorage.getItem('admin_token'); }
    function authGuard() { if (!getToken()) window.location.href = '/admin/login.html'; }
    authGuard();

    async function api(method, endpoint, body) {
      const opts = { method, headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(API + endpoint, opts);
      if (!res.ok) { localStorage.removeItem('admin_token'); window.location.href = '/admin/login.html'; }
      return res.json();
    }

    async function load() {
      const d = await api('GET', '/stations');
      stations = d.stations || [];
      renderTable();
      document.getElementById('content').style.display = 'block';
    }

    function renderTable() {
      const tbody = document.getElementById('stations-tbody');
      tbody.innerHTML = stations.map(s => '<tr>' +
        '<td><strong>' + s.name + '</strong></td>' +
        '<td><span class="badge badge-' + s.status + '">' +
        (s.status === 'active' ? 'نشطة' : s.status === 'suspended' ? 'موقوفة' : 'منتهية') +
        '</span></td>' +
        '<td>' + (s.subscriptionEnd ? new Date(s.subscriptionEnd).toLocaleDateString('ar-DZ') : '—') + '</td>' +
        '<td>' + (s.userCount || 0) + '</td>' +
        '<td>' +
          '<button class="btn btn-sm btn-primary" onclick="editStation(\''+s._id+'\')"><i class="fas fa-edit"></i></button>' +
          '<button class="btn btn-sm btn-danger" onclick="deleteStation(\''+s._id+'\')"><i class="fas fa-trash"></i></button>' +
        '</td></tr>'
      ).join('');
    }

    function openModal(mode, id) {
      document.getElementById('modal').classList.add('open');
      if (mode === 'add') {
        document.getElementById('modal-title').textContent = 'إضافة محطة';
        document.getElementById('sid').value = '';
        document.getElementById('m-name').value = '';
        document.getElementById('m-status').value = 'active';
        document.getElementById('m-end').value = '';
      } else {
        document.getElementById('modal-title').textContent = 'تعديل المحطة';
        document.getElementById('sid').value = id;
        const s = stations.find(x => x._id === id);
        if (s) {
          document.getElementById('m-name').value = s.name;
          document.getElementById('m-status').value = s.status;
          document.getElementById('m-end').value = s.subscriptionEnd ? new Date(s.subscriptionEnd).toISOString().split('T')[0] : '';
        }
      }
    }

    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    function editStation(id) { openModal('edit', id); }

    async function saveStation() {
      const id = document.getElementById('sid').value;
      const name = document.getElementById('m-name').value.trim();
      const status = document.getElementById('m-status').value;
      const end = document.getElementById('m-end').value;
      if (!name) return alert('اسم المحطة مطلوب');

      const body = { name, status };
      if (end) body.subscriptionEnd = end;

      if (id) {
        await api('PUT', '/stations/' + id, body);
      } else {
        await api('POST', '/stations', body);
      }
      closeModal();
      load();
    }

    async function deleteStation(id) {
      if (!confirm('هل أنت متأكد؟ سيتم حذف المحطة وجميع المستخدمين المرتبطين.')) return;
      await api('DELETE', '/stations/' + id);
      load();
    }

    function logout() { localStorage.removeItem('admin_token'); }
    load();
  </script>
