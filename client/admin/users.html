<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة المستخدمين - Super Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root { --primary:#1e40af; --primary-dark:#1e3a8a; --success:#059669; --danger:#dc2626; --warning:#d97706; --purple:#7c3aed; --text-dark:#0f172a; --text-secondary:#475569; --border:#e8edf2; --bg:#f8fafc; --white:#ffffff; }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text-dark); min-height:100vh; }
    .navbar { background:var(--primary-dark); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:64px; }
    .navbar-brand { color:white; font-weight:900; font-size:1.2rem; text-decoration:none; display:flex; align-items:center; gap:0.7rem; }
    .nav-links { display:flex; gap:1.5rem; align-items:center; }
    .nav-link { color:rgba(255,255,255,0.7); text-decoration:none; font-weight:700; font-size:0.9rem; }
    .nav-link:hover, .nav-link.active { color:white; }
    .btn-logout { background:rgba(255,255,255,0.15); color:white; border:1px solid rgba(255,255,255,0.25); padding:0.5rem 1rem; border-radius:8px; font-family:'Cairo'; font-weight:700; cursor:pointer; font-size:0.85rem; }
    .container { max-width:1100px; margin:2rem auto; padding:0 1.5rem; }
    h1 { font-size:1.5rem; font-weight:900; margin-bottom:1.5rem; display:flex; align-items:center; gap:0.5rem; }
    .btn { padding:0.7rem 1.5rem; border:none; border-radius:10px; font-family:'Cairo'; font-weight:700; cursor:pointer; font-size:0.9rem; }
    .btn-primary { background:var(--primary); color:white; }
    .btn-success { background:var(--success); color:white; }
    .btn-sm { padding:0.4rem 1rem; font-size:0.8rem; border-radius:6px; }
    .bg-blue { background:var(--primary); color:white; }
    .bg-green { background:var(--success); color:white; }
    .bg-purple { background:var(--purple); color:white; }
    .table-wrap { background:var(--white); border-radius:14px; border:1px solid var(--border); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    th { padding:1rem 1.2rem; background:var(--bg); font-size:0.82rem; font-weight:800; color:var(--text-secondary); text-transform:uppercase; text-align:right; }
    td { padding:1rem 1.2rem; border-top:1px solid var(--border); font-size:0.92rem; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:1000; }
    .modal-overlay.open { display:flex; }
    .modal { background:white; border-radius:16px; padding:2rem; width:90%; max-width:440px; }
    .modal h2 { font-size:1.15rem; margin-bottom:1.2rem; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.3rem; }
    .form-group input, .form-group select { width:100%; padding:0.7rem 1rem; border:1.5px solid var(--border); border-radius:8px; font-family:'Cairo'; font-size:0.95rem; outline:none; }
    .form-group input:focus, .form-group select:focus { border-color:var(--primary); }
    .modal-actions { display:flex; gap:0.5rem; margin-top:1.5rem; }
    .badge-role { display:inline-block; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.78rem; font-weight:700; }
    .badge-admin { background:#dbeafe; color:#1e40af; }
    .badge-supervisor { background:#d1fae5; color:#065f46; }
    .badge-user { background:#f1f5f9; color:#475569; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/admin/" class="navbar-brand"><i class="fas fa-shield-alt"></i> الإدارة العامة</a>
    <div class="nav-links">
      <a href="/admin/" class="nav-link"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</a>
      <a href="/admin/stations.html" class="nav-link"><i class="fas fa-building"></i> المحطات</a>
      <a href="/admin/users.html" class="nav-link active"><i class="fas fa-users"></i> المستخدمون</a>
      <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
  </nav>

  <div class="container" id="content" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <h1><i class="fas fa-users"></i> إدارة المستخدمين</h1>
      <button class="btn btn-primary" onclick="openModal('add')"><i class="fas fa-plus"></i> إضافة مستخدم</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>المستخدم</th><th>الدور</th><th>المحطة</th><th>الحالة</th><th>إجراءات</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal" style="animation:fadeUp .25s ease">
      <h2 id="mtitle">إضافة مستخدم</h2>
      <input type="hidden" id="uid">
      <div class="form-group"><label>اسم المستخدم</label><input type="text" id="u-name"></div>
      <div class="form-group"><label>كلمة المرور</label><input type="password" id="u-pass" placeholder="اتركه فارغاً إذا لا تريد التغيير"></div>
      <div class="form-group">
        <label>الدور</label>
        <select id="u-role">
          <option value="user">مستخدم عادي</option>
          <option value="supervisor">مشرف</option>
          <option value="admin">مسؤول</option>
        </select>
      </div>
      <div class="form-group"><label>المحطة</label><select id="u-station"></select></div>
      <div class="form-group">
        <label>الحالة</label>
        <select id="u-active">
          <option value="true">نشط</option>
          <option value="false">موقوف</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-success" onclick="save()">حفظ</button>
        <button class="btn btn-primary" onclick="closeModal()">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/superadmin';
    let users = [], allStations = [];
    function getToken() { return localStorage.getItem('admin_token'); }
    if (!getToken()) window.location.href = '/admin/login.html';

    async function api(method, ep, body) {
      const o = { method, headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' } };
      if (body) o.body = JSON.stringify(body);
      const r = await fetch(API + ep, o);
      if (!r.ok) { localStorage.removeItem('admin_token'); window.location.href = '/admin/login.html'; }
      return r.json();
    }

    async function load() {
      const [ud, sd] = await Promise.all([api('GET', '/users'), api('GET', '/stations')]);
      users = ud.users || [];
      allStations = sd.stations || [];
      const sel = document.getElementById('u-station');
      sel.innerHTML = allStations.map(s => '<option value="'+s._id+'">'+s.name+'</option>').join('');
      render();
      document.getElementById('content').style.display = 'block';
    }

    function render() {
      document.getElementById('tbody').innerHTML = users.map(u => '<tr>' +
        '<td><strong>'+u.username+'</strong></td>' +
        '<td><span class="badge-role badge-'+u.role+'">'+(u.role==='admin'?'مسؤول':u.role==='supervisor'?'مشرف':'مستخدم')+'</span></td>' +
        '<td>'+(u.stationId?u.stationId.name:'—')+'</td>' +
        '<td>'+((u.isActive !== false) ? '<span style="color:var(--success)">نشط</span>' : '<span style="color:var(--danger)">موقوف</span>')+'</td>' +
        '<td>' +
          '<button class="btn btn-primary btn-sm" onclick="editU(\''+u._id+'\')"><i class="fas fa-edit"></i></button> ' +
          '<button class="btn btn-sm" style="background:var(--danger);color:white;" onclick="delU(\''+u._id+'\')"><i class="fas fa-trash"></i></button>' +
        '</td></tr>'
      ).join('');
    }

    function openModal(m) {
      document.getElementById('modal').classList.add('open');
      if (m === 'add') {
        document.getElementById('mtitle').textContent = 'إضافة مستخدم';
        document.getElementById('uid').value = '';
        document.getElementById('u-name').value = '';
        document.getElementById('u-pass').value = '';
        document.getElementById('u-role').value = 'user';
        document.getElementById('u-active').value = 'true';
        document.getElementById('u-pass').disabled = false;
      } else {
        document.getElementById('mtitle').textContent = 'تعديل مستخدم';
        document.getElementById('u-pass').disabled = true;
        document.getElementById('u-pass').placeholder = 'اتركه فارغاً';
      }
    }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    function editU(id) {
      const u = users.find(x => x._id === id);
      if (!u) return;
      document.getElementById('uid').value = u._id;
      document.getElementById('u-name').value = u.username;
      document.getElementById('u-pass').value = '';
      document.getElementById('u-role').value = u.role;
      document.getElementById('u-station').value = u.stationId._id;
      document.getElementById('u-active').value = (u.isActive !== false).toString();
      openModal('edit');
    }

    async function delU(id) {
      if (!confirm('هل أنت متأكد؟')) return;
      await api('DELETE', '/users/' + id);
      load();
    }

    async function save() {
      const id = document.getElementById('uid').value;
      const username = document.getElementById('u-name').value.trim();
      const pass = document.getElementById('u-pass').value;
      const role = document.getElementById('u-role').value;
      const stationId = document.getElementById('u-station').value;
      const isActive = document.getElementById('u-active').value === 'true';
      if (!username || !role || !stationId) return alert('جميع الحقول مطلوبة');

      const body = { username, role, stationId, isActive };
      if (pass) body.password = pass;

      if (id) {
        delete body.password;
        if (pass) body.password = pass;
        await api('PUT', '/users/' + id, body);
      } else {
        if (!pass) return alert('كلمة المرور مطلوبة');
        body.password = pass;
        await api('POST', '/users', body);
      }
      closeModal();
      load();
    }

    function logout() { localStorage.removeItem('admin_token'); window.location.href = '/admin/login.html'; }
    load();
  </script>
</body>
</html>
