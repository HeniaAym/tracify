<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إقفال الصندوق - Tracify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <style>
    .btn-view-parcels { display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .82rem;background:#ede9fe;color:#7c3aed;border:none;border-radius:20px;font-family:'Cairo',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;transition:var(--transition); }
    .btn-view-parcels:hover { background:#7c3aed;color:white;transform:translateY(-1px); }
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);z-index:500;align-items:center;justify-content:center;padding:1.5rem; }
    .modal-overlay.active { display:flex;animation:fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal { background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:820px;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);overflow:hidden; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .modal-header { display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0; }
    .modal-header-title { display:flex;align-items:center;gap:.6rem;font-size:1rem;font-weight:800;color:var(--dark); }
    .modal-header-title i { color:#7c3aed; }
    .modal-close { width:32px;height:32px;border:1px solid var(--border);background:none;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:.9rem;transition:var(--transition); }
    .modal-close:hover { background:var(--danger);color:white;border-color:var(--danger); }
    .modal-body { flex:1;overflow-y:auto; }
    .modal-body table { width:100%;border-collapse:collapse;font-size:.875rem; }
    .modal-body thead th { background:var(--light);border-bottom:2px solid var(--border);padding:.65rem 1rem;font-weight:700;color:var(--gray);font-size:.75rem;position:sticky;top:0;text-align:right; }
    .modal-body tbody td { padding:.7rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle; }
    .modal-body tbody tr:last-child td { border-bottom:none; }
    .modal-body tbody tr:hover { background:var(--light); }
    .modal-footer { flex-shrink:0; }
    #connectedBoxSelect {
      padding: .75rem 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Cairo', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      background: white;
      cursor: pointer;
      width: 100%;
      transition: var(--transition);
    }
    #connectedBoxSelect:focus { border-color: var(--primary); outline: none; }
  </style>
</head>
<body>

<div id="navbar-mount"></div>
<div class="container">
    <div class="page-header">
      <div class="page-header-icon" style="background:linear-gradient(135deg,#7c3aed,#2563eb);"><i class="fas fa-lock"></i></div>
      <div><h1>تجميع الصندوق</h1><p>مطابقة الرصيد وتسجيل عمليات التجميع اليومية</p></div>
    </div>

    <div style="display:grid;grid-template-columns:400px 1fr;gap:1.25rem;align-items:start;">
      <div style="display:flex;flex-direction:column;gap:1rem;position:sticky;top:72px;">
        <div class="card">
          <div class="card-body" style="display:flex;align-items:center;gap:1rem;">
            <div style="width:48px;height:48px;background:#ede9fe;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#7c3aed;flex-shrink:0;"><i class="fas fa-calculator"></i></div>
            <div>
              <div style="font-size:.75rem;font-weight:700;color:var(--gray);">الرصيد الحالي للتجميع</div>
              <div style="font-size:1.55rem;font-weight:800;color:var(--dark);"><span id="expected">0</span> <span style="font-size:.78rem;font-weight:600;color:var(--gray);">DA</span></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-header-title"><i class="fas fa-cash-register"></i> بيانات التجميع</div></div>
          <div class="card-body">
            <form id="closingForm" style="display:flex;flex-direction:column;gap:1rem;">
              <div class="form-group">
                <label>الصندوق المتصل</label>
                <select id="connectedBoxSelect" required>
                  <option value="">-- اختر الصندوق --</option>
                </select>
              </div>
              <div class="form-group"><label>المبلغ الفعلي (DA)</label><input type="number" id="actualAmount" placeholder="0" min="0" required></div>
              <div class="form-group"><label>ملاحظات <span style="font-size:.73rem;color:var(--gray);font-weight:400;">(اختياري)</span></label><textarea id="notes" placeholder="ملاحظات إضافية..."></textarea></div>
              <button type="submit" class="btn btn-primary btn-full btn-lg"><i class="fas fa-lock"></i> تأكيد التجميع</button>
            </form>
            <div id="result" style="margin-top:1rem;"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-header-title"><i class="fas fa-history"></i> سجل التجميعات</div></div>
        <div class="table-wrapper" style="border:none;border-radius:0 0 var(--radius) var(--radius);">
          <table class="table">
            <thead><tr><th>رقم التجميعة</th><th>التاريخ</th><th>النظري</th><th>الفعلي</th><th>الفرق</th><th>المستخدم</th><th>المشرف</th><th>الطرود</th></tr></thead>
            <tbody id="closings-list">
              <tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon" style="background:#ede9fe;color:#7c3aed;"><i class="fas fa-archive"></i></div><h3>لا توجد تجميعات</h3><p>ستظهر هنا بعد أول تجميع</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<!-- Modal الطرود -->
<div class="modal-overlay" id="parcelsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-title"><i class="fas fa-boxes"></i><span id="modalTitle">طرود التجميعة</span></div>
      <button class="modal-close" onclick="closeParcelsModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <table><thead><tr><th>#</th><th>رقم التتبع</th><th>العميل</th><th>الهاتف</th><th>المبلغ</th></tr></thead>
      <tbody id="modalBody"></tbody></table>
    </div>
    <div class="modal-footer" id="modalSummary"></div>
  </div>
</div>

<div id="global-loader" class="loader" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;"></div>
<script src="scripts/api.js"></script>
<script src="scripts/navbar.js"></script>
<script>
// ==================================================
// تحميل الصناديق المتصلة في القائمة المنسدلة
// ==================================================
let connectedBoxes = [];

async function loadConnectedBoxes() {
  try {
    connectedBoxes = await fetchAPI('/moneybox/connected') || [];
    const sel = document.getElementById('connectedBoxSelect');
    sel.innerHTML = '<option value="">-- اختر الصندوق --</option>';
    connectedBoxes.forEach(box => {
      const opt = document.createElement('option');
      opt.value = box._id;
      opt.textContent = `🟢 ${box.name} — ${box.connectedByName} — ${Number(box.balance || 0).toLocaleString('ar-DZ')} DA`;
      sel.appendChild(opt);
    });
    if (connectedBoxes.length === 1) {
      sel.value = connectedBoxes[0]._id;
      selectBox(connectedBoxes[0]._id);
    }
  } catch (err) {
    document.getElementById('connectedBoxSelect').innerHTML =
      '<option value="">لا توجد صناديق متصلة</option>';
  }
}

function selectBox(id) {
  const box = connectedBoxes.find(b => b._id === id);
  if (!box) return;
  document.getElementById('expected').textContent =
    Number(box.balance || 0).toLocaleString('ar-DZ');
}

document.getElementById('connectedBoxSelect').addEventListener('change', function () {
  selectBox(this.value);
});

loadConnectedBoxes();
</script>
<script src="scripts/closing.js"></script>
</body>
</html>
